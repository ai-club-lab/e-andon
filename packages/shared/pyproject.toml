[project]
name = "chokotei-shared"
version = "0.1.0"
description = "Shared typed contracts and config for chokotei-anomaly-rca"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7,<3"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["chokotei_shared*"]
