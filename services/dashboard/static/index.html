<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-Andon — AIアンドン｜工場ライン見える化 × AI原因推定</title>
<style>
:root{
  --bg:#f6f7fb; --card:#ffffff; --ink:#1a2030; --muted:#6b7488; --line:#e7e9f0;
  --brand:#4f46e5; --brand-soft:#eef0fe;
  --ok:#12a150; --ok-soft:#e7f7ee; --alert:#e5484d; --alert-soft:#fdecec;
  --warn:#d9860a; --shadow:0 1px 2px rgba(20,30,60,.04),0 6px 20px rgba(20,30,60,.06);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,"Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased}
/* ---- header ---- */
header{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:12px 22px;background:var(--card);border-bottom:1px solid var(--line);z-index:5}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.logo{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:16px}
.brand small{display:block;font-weight:500;font-size:11px;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.hstat{display:flex;gap:8px;align-items:center}
.hstat .kpi{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:5px 13px;text-align:center;min-width:74px}
.hstat .kpi b{display:block;font-size:16px;line-height:1.2}
.hstat .kpi span{font-size:10.5px;color:var(--muted)}
.status{display:flex;align-items:center;gap:9px;padding:8px 15px;border-radius:999px;font-weight:700;font-size:13.5px;transition:.25s}
.status .dot{width:9px;height:9px;border-radius:50%;background:currentColor}
.status.ok{background:var(--ok-soft);color:var(--ok)}
.status.warn{background:#fff6e6;color:var(--warn)}
.status.alert{background:var(--alert-soft);color:var(--alert)}
.status.warn .dot,.status.alert .dot{animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(229,72,77,.5)}70%{box-shadow:0 0 0 8px rgba(229,72,77,0)}100%{box-shadow:0 0 0 0 rgba(229,72,77,0)}}
/* ---- app shell ---- */
.shell{flex:1;display:flex;min-height:0}
/* sidebar */
.sidebar{flex:0 0 232px;background:var(--card);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px}
.side-h{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin:6px 8px 8px}
.line-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid transparent;background:none;
  border-radius:10px;padding:9px 10px;margin-bottom:3px;cursor:pointer;transition:.12s}
.line-item:hover{background:var(--bg)}
.line-item.on{background:var(--brand-soft);border-color:#dfe2fd}
.line-item .ld{width:9px;height:9px;border-radius:50%;background:var(--ok);flex:0 0 auto}
.line-item .ld.warn{background:var(--warn)}.line-item .ld.alert{background:var(--alert);animation:pulse 1s infinite}
.line-item .lt{flex:1;min-width:0}
.line-item .lt b{display:block;font-size:13.5px;font-weight:600}
.line-item .lt span{font-size:11px;color:var(--muted)}
.line-item .lb{font-size:9.5px;font-weight:700;color:var(--alert);border:1px solid var(--alert);border-radius:5px;padding:1px 5px}
.menu-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:none;color:var(--muted);
  border-radius:10px;padding:8px 10px;font-size:13px;cursor:pointer}
.menu-item:hover{background:var(--bg);color:var(--ink)}
.menu-item:disabled{opacity:.45;cursor:not-allowed}
.menu-item:disabled:hover{background:none;color:var(--muted)}
.menu-soon{margin-left:auto;font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 5px}
/* center (scrolls) */
.center{flex:1;overflow-y:auto;min-width:0;padding:18px 22px}
.line-title{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.line-title h1{font-size:19px;margin:0}
.line-title .sub{font-size:12px;color:var(--muted)}
.sect{margin-bottom:20px}
.sect-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px}
.sect-h .note{font-size:11px;font-weight:500;color:var(--muted)}
.sect-h .badge{font-size:10px;font-weight:700;color:var(--brand);background:var(--brand-soft);border:1px solid #dfe2fd;border-radius:6px;padding:1px 7px}
.grid{display:grid;gap:12px}
.grid.g3{grid-template-columns:repeat(3,1fr)}
.grid.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.card-h{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:600;font-size:13.5px}
.card-h .live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--alert);font-weight:700}
.card-h .live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--alert);animation:pulse 1s infinite}
.tag{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
/* video */
.video-wrap{position:relative;background:#0c0e14}
.video-wrap img{display:block;position:relative;z-index:1;width:100%;aspect-ratio:1014/634;object-fit:cover}
.video-wrap img[src=""],.video-wrap img:not([src]){visibility:hidden}
.video-ph{position:absolute;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;color:#8b93a7;font-size:13px}
.vcap{display:flex;align-items:center;gap:14px;padding:10px 14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.vcap b{color:var(--ink)}
.vcap .pill{font-weight:700;border-radius:999px;padding:3px 10px;font-size:12px}
.vcap .pill.ok{background:var(--ok-soft);color:var(--ok)}
.vcap .pill.warn{background:#fff6e6;color:var(--warn)}
.vcap .pill.alert{background:var(--alert-soft);color:var(--alert)}
/* mini chart */
.mini .mh{display:flex;align-items:baseline;gap:8px;padding:9px 12px 4px}
.mini .mh .ml{font-size:12px;font-weight:600;color:var(--muted)}
.mini .mh .mv{margin-left:auto;font-size:15px;font-weight:700}
.mini .mh .mu{font-size:10px;color:var(--muted);font-weight:500}
.mini canvas{width:100%;height:78px;display:block;padding:0 8px 8px}
.mini.warnv{border-color:#f3c088}.mini.badv{border-color:var(--alert)}
.demo-note{font-size:12px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.lb.demo{color:var(--muted);border-color:var(--line)}
.guide{position:relative;font-size:12.5px;background:var(--brand-soft);border:1px solid #dfe2fd;border-radius:12px;padding:10px 34px 10px 14px;margin-bottom:14px;line-height:1.7}
.guide b{color:var(--brand)}
.guide ol{margin:4px 0 0 18px;padding:0}
.guide .gx{position:absolute;top:8px;right:10px;border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer}
/* chat (independent scroll) */
.chat{flex:0 0 384px;background:var(--card);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.chat-h{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);font-weight:600;font-size:14px}
.feed{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.feed>*{flex-shrink:0}
.msg{max-width:92%;font-size:13.5px;line-height:1.5}
.msg.bot{align-self:flex-start;background:var(--bg);border:1px solid var(--line);border-radius:14px 14px 14px 4px;padding:10px 12px}
.msg.me{align-self:flex-end;background:var(--brand);color:#fff;border-radius:14px 14px 4px 14px;padding:10px 12px}
.alert-card{align-self:stretch;border:1px solid var(--alert);border-left:4px solid var(--alert);border-radius:12px;overflow:hidden;background:#fff;animation:slidein .35s ease}
@keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.alert-card .ah{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--alert-soft);color:var(--alert);font-weight:700;font-size:13px}
.alert-card .ab{padding:11px 12px;font-size:13px}
.alert-card .cause{font-weight:700;font-size:14px;margin-bottom:6px;line-height:1.5}
.conf{display:flex;align-items:center;gap:8px;margin:6px 0}
.conf .bar{flex:1;height:7px;border-radius:4px;background:var(--line);overflow:hidden}
.conf .bar i{display:block;height:100%;background:var(--brand)}
.conf small{color:var(--muted);font-size:11px}
.evi{font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:7px 9px;margin-top:6px}
/* aspect-ratio reserves the box before the async load, so the verdict buttons
   below never get pushed out of the initial view */
.thumb{width:100%;aspect-ratio:1014/634;object-fit:cover;border-radius:8px;margin-top:8px;border:1px solid var(--line)}
.sim{font-size:12px;color:var(--ink);background:#fdf6e7;border:1px solid #f0dcb0;border-radius:8px;padding:7px 9px;margin-top:6px;line-height:1.6}
.sim a{color:var(--brand)}
.ackrow{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ackrow .ackwho{flex:1 0 100%;font-size:11.5px;color:var(--muted)}
.ackrow .ackchip{width:auto;flex:0 0 auto;border-style:solid;padding:6px 12px;border-radius:14px}
.ackrow .ackname{flex:1 1 120px;border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-size:12.5px;background:var(--card);color:var(--ink)}
.ackrow button{width:100%;border:1px dashed var(--line);background:var(--bg);border-radius:9px;
  padding:7px;font-size:12.5px;color:var(--muted);cursor:pointer}
.ackrow button:hover{border-color:var(--brand);color:var(--brand)}
.ackrow .acked{border-style:solid;color:var(--warn);border-color:#f3c088;background:#fff6e6;pointer-events:none}
.fb{display:flex;gap:8px;margin-top:10px}
.fb button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.fb button.ok:hover{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.fb button.no:hover{background:var(--alert-soft);border-color:var(--alert);color:var(--alert)}
.fb button.done{opacity:.5;pointer-events:none}
.alert-card.correcting{border-color:var(--brand);border-left-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.alert-card.corrected .ah{background:var(--ok-soft);color:var(--ok)}
.composer{border-top:1px solid var(--line);padding:12px;background:#fff}
.composer.correcting{background:var(--brand-soft)}
.cbanner{display:none;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--brand);margin-bottom:9px}
.composer.correcting .cbanner{display:flex}
.cbanner .cx{margin-left:auto;border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px}
#stop-clock{font-weight:700;border-radius:999px;padding:3px 10px;font-size:12px;background:var(--alert-soft);color:var(--alert)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.chip{font-size:12px;color:var(--brand);background:var(--brand-soft);border:1px solid #dfe2fd;border-radius:999px;padding:4px 10px;cursor:pointer}
.inrow{display:flex;gap:8px}
.inrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
.inrow input:focus{border-color:var(--brand)}
.inrow button{border:0;background:var(--brand);color:#fff;border-radius:10px;padding:0 16px;font-weight:600;cursor:pointer}
.empty{color:var(--muted);font-size:13px;text-align:center;margin:auto;padding:20px;line-height:1.7}
.status{white-space:nowrap}
@media(max-width:1100px){.sidebar{flex-basis:180px}.chat{flex-basis:320px}.grid.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.grid.g3,.grid.g2{grid-template-columns:repeat(2,1fr)}}
/* phone: the 3-pane shell collapses to one scrolling column —
   line selector becomes a horizontal chip row, chat becomes a bottom block */
@media(max-width:700px){
  body{overflow:auto;display:block}
  header{flex-wrap:wrap;gap:8px;padding:10px 12px;position:sticky;top:0}
  .brand small{display:none}
  .hstat .kpi{min-width:60px;padding:4px 9px}
  .status{font-size:12px;padding:6px 10px}
  .shell{display:block}
  .sidebar{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:8px 12px;
    border-right:0;border-bottom:1px solid var(--line)}
  .side-h{display:none}
  #lines{display:flex;gap:6px;flex:0 0 auto}
  .line-item{width:auto;flex:0 0 auto;margin:0;white-space:nowrap}
  .line-item .lt span{display:none}
  .menu-item{width:auto;flex:0 0 auto;white-space:nowrap}
  .menu-item:disabled{display:none}
  .center{overflow:visible;padding:12px}
  .grid.g3,.grid.g2{grid-template-columns:1fr}
  .chat{border-left:0;border-top:1px solid var(--line);height:72vh}
}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">◧</div>
    <div>e-Andon<small>AIアンドン｜ライン見える化 × AI原因推定</small></div>
  </div>
  <div class="spacer"></div>
  <div class="hstat">
    <div class="kpi"><b id="k-lines">–</b><span>稼働ライン</span></div>
    <div class="kpi"><b id="k-acc">–</b><span>AI 正答率</span></div>
  </div>
  <div id="status" class="status ok"><span class="dot"></span><span id="status-t">接続中…</span></div>
</header>

<div class="shell">
  <aside class="sidebar">
    <div class="side-h">生産ライン</div>
    <div id="lines"></div>
    <div class="side-h" style="margin-top:16px">メニュー</div>
    <button class="menu-item" onclick="location.href='/analytics'" title="パレート図・再発検知・AI正答率">📊 分析・履歴</button>
    <button class="menu-item" disabled title="このデモでは対象外です">⚙ 設定<span class="menu-soon">準備中</span></button>
  </aside>

  <main class="center" id="center"></main>

  <aside class="chat">
    <div class="chat-h">🤖 AI アシスタント<span class="tag" style="margin-left:auto">ADK · Gemini 3</span></div>
    <div class="feed" id="feed">
      <div class="empty" id="empty">全ラインを監視しています。<br>異常を検知すると、推定原因とともにここに通知します。<br>下の入力からログ照会もできます。</div>
    </div>
    <div class="composer" id="composer">
      <div class="cbanner"><span>✏️ 訂正モード — AIに現場の原因を教えています</span>
        <button class="cx" onclick="cancelCorrection()">やめる</button></div>
      <div class="chips" id="chips"></div>
      <div class="inrow"><input id="q" placeholder="ラインやログについて質問…" onkeydown="onKey(event)">
        <button onclick="send()">送信</button></div>
    </div>
  </aside>
</div>

<script>
const $=s=>document.querySelector(s);
const feed=$('#feed'), statusEl=$('#status'), statusT=$('#status-t');
const UID=localStorage.getItem('eandon-uid')||('op-'+Math.random().toString(36).slice(2,10));
localStorage.setItem('eandon-uid',UID);   // per-browser operator id → multi-turn chat session
let hasContent=false;

// ---- lines: line A is LIVE (real camera + detection); B/C/D are demo (graphs only) ----
const LINES=[
  {id:'A',name:'組立ライン 1',area:'整列・供給工程',live:true},
  {id:'B',name:'梱包ライン',area:'箱詰め工程',prof:{belt_speed:9.5,motor_current:2.4,motor_temp:38}},
  {id:'C',name:'検査ライン',area:'外観検査工程',prof:{belt_speed:6.0,motor_current:1.8,motor_temp:36}},
  {id:'D',name:'搬送ライン',area:'コンベア搬送',prof:{belt_speed:15.0,motor_current:3.6,motor_temp:44}},
];
// image-analysis metrics (derived by the camera/AI — NOT raw sensor logs)
const VISION={
  offset:{label:'整列ズレ',unit:'px',tol:12,color:'#4f46e5'},
  angle: {label:'角度ズレ',unit:'°', tol:6, color:'#7c3aed'},
  gap:   {label:'ピッチ偏差',unit:'',tol:0.30,color:'#0ea5a3'},
};
// raw machine-sensor logs
const SENSORS={
  belt_speed:   {label:'ベルト速度',unit:'m/min',base:12.0,amp:0.12},
  motor_current:{label:'モータ電流',unit:'A',    base:3.0, amp:0.08},
  vibration:    {label:'振動',      unit:'mm/s', base:0.38,amp:0.04},
  motor_temp:   {label:'モータ温度',unit:'℃',    base:42.0,amp:0.30},
  air_pressure: {label:'エア圧',    unit:'MPa',  base:0.50,amp:0.012},
};
let activeLine='A';
let lineStatus='running';                       // status of line A (the live one)
const hist={t:[],offset:[],angle:[],gap:[]};    // live vision metrics for line A
const iotCache={};                              // /iot points for line A sensors
const demoCache={};                             // synthetic points for demo lines
let lastImg='', lastParts='–', lastTs=0;
let stopSince=0;   // wall-clock ms when line A first read 'stopped' (choko-tei elapsed)
function updateStopClock(){
  const el=$('#stop-clock'); if(!el) return;
  if(lineStatus==='stopped' && stopSince){
    const s=Math.floor((Date.now()-stopSince)/1000);
    el.style.display=''; el.textContent='⛔ 停止 '+String((s/60)|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+' 経過';
  } else el.style.display='none';
}

// ---- status helpers ----
const STATUS={running:['ok','全ライン 正常監視中'],warning:['warn','⚠ 組立ライン1 異常検知'],
  stopped:['alert','⛔ 組立ライン1 停止（チョコ停）'],recovered:['ok','全ライン 正常監視中']};
function setGlobalStatus(){
  const [cls,txt]=STATUS[lineStatus]||STATUS.running;
  statusEl.className='status '+cls; statusT.textContent=txt;
  const running=LINES.length-(lineStatus==='stopped'?1:0);
  $('#k-lines').textContent=running+' / '+LINES.length;
}

// ---- sidebar ----
function renderSidebar(){
  const box=$('#lines'); box.innerHTML='';
  for(const L of LINES){
    const b=document.createElement('button'); b.className='line-item'+(L.id===activeLine?' on':''); b.dataset.id=L.id;
    const dotCls = L.live ? ('ld '+({running:'',warning:'warn',stopped:'alert',recovered:''}[lineStatus]||'')) : 'ld';
    b.innerHTML='<span class="'+dotCls.trim()+'" id="dot-'+L.id+'"></span>'+
      '<span class="lt"><b>'+L.name+'</b><span>'+L.area+'</span></span>'+
      (L.live?'<span class="lb">LIVE</span>':'<span class="lb demo">デモ</span>');
    b.onclick=()=>selectLine(L.id); box.appendChild(b);
  }
}
function selectLine(id){ activeLine=id; for(const k in liveBuf) delete liveBuf[k]; renderSidebar(); renderCenter(); }

// ---- center ----
function renderCenter(){
  const L=LINES.find(x=>x.id===activeLine), c=$('#center'); c.innerHTML='';
  const title=document.createElement('div'); title.className='line-title';
  title.innerHTML='<h1>'+L.name+'</h1><span class="sub">'+L.area+'</span>';
  c.appendChild(title);
  if(L.live){
    if(!localStorage.getItem('eandon-guide-hide')){
      c.insertAdjacentHTML('beforeend', `
      <div class="guide"><button class="gx" onclick="localStorage.setItem('eandon-guide-hide','1');this.parentElement.remove()">✕</button>
        <b>👀 デモの見方（検知から通知まで実時間・約10〜30秒）</b><ol>
        <li>実映像が流れ、約6秒で整列ズレを<b>赤枠で検知</b> → 動画終了とともにライン停止（チョコ停）</li>
        <li>右のAIエージェントがセンサーを自律照会し、<b>消去法で真因・確信度・根拠</b>を通知</li>
        <li>「✓ 正しい」で承認、「✗ 原因が違う」で<b>AIが対話で真因を質問</b> — 答えると事例化して次回に反映（AI正答率も更新）</li>
        <li>チャットで「各センサーは正常？」等の追加質問も可能。もう一度見るにはページを再読み込み</li></ol>
        <div style="margin-top:6px;color:var(--muted)">💡 本番運用では通知は現場のSlackに届き、担当者（当番表で自動選定）が応答します。
        この画面は監視・分析用 — デモでは同じ裁定・対話をここでも体験できます（担当名はデモ用の架空名簿）。</div></div>`);
    }
    c.insertAdjacentHTML('beforeend', `
      <div class="sect"><div class="card">
        <div class="card-h">ライン映像<span class="tag">俯瞰カメラ + 画像解析</span><span class="live">LIVE</span></div>
        <div class="video-wrap"><img id="frame" alt="line"><div class="video-ph">📡 映像ストリーム接続中…</div></div>
        <div class="vcap"><span>検知部品 <b id="c-parts">–</b></span>
          <span id="c-flag" class="pill ok">整列 正常</span>

function buildGrid(gridId, keys, kind){

      '<canvas id="cv-'+kind+'-'+k+'" width="300" height="90"></canvas>';

// ---- mini chart drawing ----
const curT=()=>+(lastTs||0);
function drawMini(canvasId, pts, cfg, opt){
  const cv=document.getElementById(canvasId); if(!cv)return; const x=cv.getContext('2d');
  const W=cv.width,H=cv.height,padL=30,padR=8,padT=8,padB=16,w=W-padL-padR,h=H-padT-padB,T=10;
  x.clearRect(0,0,W,H);
  const tol=opt.tol||0;
  const vmax=(Math.max(tol*1.3, opt.base?opt.base*1.35:0, ...pts.map(p=>p[1]), .1))*1.05||1;
  const px=t=>padL+(t/T)*w, py=v=>padT+h-(v/vmax)*h;
  x.strokeStyle='#eef1f6';x.lineWidth=1;x.fillStyle='#aab0bd';x.font='9px sans-serif';
  [0,vmax/2,vmax].forEach(v=>{const yy=py(v);x.beginPath();x.moveTo(padL,yy);x.lineTo(W-padR,yy);x.stroke();
    x.fillText(v.toFixed(vmax<3?1:0),3,yy+3);});
  if(tol){ const yy=py(tol); x.strokeStyle='#f0b0b0';x.setLineDash([4,3]);x.beginPath();x.moveTo(padL,yy);x.lineTo(W-padR,yy);x.stroke();x.setLineDash([]); }
  x.strokeStyle=cfg.color||'#5b6472';x.lineWidth=1.7;x.beginPath();
  pts.forEach((p,i)=>{const X=px(p[0]),Y=py(p[1]);i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();
  if(opt.cursor!=null && opt.cursor>0){ x.strokeStyle='#12a150';x.lineWidth=1.3;
    x.beginPath();x.moveTo(px(opt.cursor),padT);x.lineTo(px(opt.cursor),padT+h);x.stroke(); }
}

// ---- live rolling sensor series (wall-clock) ----
// Used for the other production lines (always running) and for the live line
// AFTER it stops — a stopped belt still leaves the machine powered, so temp
// cools gradually and vibration/air keep a faint residual instead of flatlining.
const liveBuf={};            // "lineId:key" -> [[tSec,v],...] over the last LIVE_WINDOW s
const LIVE_WINDOW=10;
function sensorTarget(lineId, key){
  const L=LINES.find(l=>l.id===lineId)||{}, cfg=SENSORS[key];
  if(L.live && lineStatus==='stopped'){
    if(key==='belt_speed')    return {base:0.0,  amp:0.04};   // belt halted
    if(key==='motor_current') return {base:0.2,  amp:0.03};   // motor idle
    if(key==='vibration')     return {base:0.09, amp:0.03};   // faint residual
    if(key==='motor_temp'){ const s=stopSince?(Date.now()-stopSince)/1000:0;
      return {base:Math.max(30, 42-0.05*s), amp:0.12}; }      // gradual cooldown
    if(key==='air_pressure')  return {base:0.50, amp:0.006};  // still pressurized
  }
  const prof=L.prof||{};                                      // running: normal band
  return {base: prof[key]!=null?prof[key]:cfg.base, amp:cfg.amp};
}
function sampleSensor(lineId, key){
  const {base,amp}=sensorTarget(lineId,key);   // all channels are non-negative physical quantities
  return +Math.max(0, base + (Math.random()-0.5)*amp*2).toFixed(3);
}
function pushLive(lineId, key){
  const ck=lineId+':'+key, now=performance.now()/1000; let buf=liveBuf[ck];
  if(!buf){ buf=liveBuf[ck]=[]; for(let t=now-LIVE_WINDOW;t<now;t+=0.4) buf.push([t,sampleSensor(lineId,key)]); }
  buf.push([now, sampleSensor(lineId,key)]);
  while(buf.length && now-buf[0][0]>LIVE_WINDOW) buf.shift();
  return buf;
}
function drawLive(canvasId, buf, cfg){
  const now=performance.now()/1000, pts=buf.map(([t,v])=>[t-(now-LIVE_WINDOW),v]);
  drawMini(canvasId, pts, {color:'#5b6472'}, {base:cfg.base});
}

async function iotPoints(key){
  if(iotCache[key]) return iotCache[key];
  try{ const d=await (await fetch('/iot?channel='+key+'&t0=0&t1=10')).json(); iotCache[key]=d.found?d.points:[]; }
  catch(e){ iotCache[key]=[]; }
  return iotCache[key];
}

async function redraw(){
  const L=LINES.find(x=>x.id===activeLine);
  if(L.live){
    const sn=$('#sensor-note'); if(sn) sn.textContent='機械センサーの生データ · '+
      (lineStatus==='stopped'?'ライン停止中（残留値・温度は自然冷却）':'全チャネル正常');
    // vision metrics from the live stream
    for(const k in VISION){ const cfg=VISION[k];
      const pts=hist.t.map((t,i)=>[t,hist[k][i]]);
      drawMini('cv-vis-'+k, pts, cfg, {tol:cfg.tol, cursor:curT()});
      const cur=pts.length?pts[pts.length-1][1]:0, bad=cur>cfg.tol;
      const mv=$('#mv-vis-'+k); if(mv){ mv.textContent=cur; mv.style.color=bad?'var(--alert)':''; }
      $('#mini-vis-'+k)?.classList.toggle('badv',bad);
    }
    for(const k in SENSORS){ const cfg=SENSORS[k]; let cur;
      if(lineStatus==='stopped'){                       // machine powered, belt halted — keep it alive
        const buf=pushLive('A',k); drawLive('cv-sen-'+k, buf, cfg);
        cur=buf[buf.length-1][1];
      } else {                                          // running: real IoT log up to the play cursor
        const all=await iotPoints(k); const pts=all.filter(p=>p[0]<=curT());
        drawMini('cv-sen-'+k, pts, {color:'#5b6472'}, {base:cfg.base, cursor:curT()});
        cur=pts.length?pts[pts.length-1][1]:cfg.base;
        delete liveBuf['A:'+k];                         // reseed the live view fresh at the stop transition
      }
      const mv=$('#mv-sen-'+k); if(mv) mv.textContent=(+cur).toFixed(2);
    }
  } else {                                              // other lines run independently — always live
    for(const k in SENSORS){ const cfg=SENSORS[k];
      const buf=pushLive(L.id,k); drawLive('cv-sen-'+k, buf, cfg);
      const mv=$('#mv-sen-'+k); if(mv) mv.textContent=buf[buf.length-1][1].toFixed(2);
    }
  }
}

// ---- live stream (line A) ----
let es=null;
function onFrame(e){
  const d=JSON.parse(e.data);
  lastImg=d.image; lastParts=d.n_parts; lastTs=d.ts;
  const flagged=d.flags && d.flags.length>0;
  lineStatus=d.line_status||'running';
  if(lineStatus==='stopped'){ if(!stopSince) stopSince=Date.now(); } else stopSince=0;
  if(flagged) anomalySeen=true;
  if(d.metrics && d.frame_index>=0){ hist.t.push(d.ts);
    hist.offset.push(d.metrics.offset); hist.angle.push(d.metrics.angle); hist.gap.push(d.metrics.gap); }
  // update the live-line DOM only if it's the one on screen
  if(activeLine==='A'){
    const im=$('#frame'); if(im) im.src='data:image/jpeg;base64,'+d.image;
    const cp=$('#c-parts'); if(cp) cp.textContent=d.n_parts;
    const cts=$('#c-ts'); if(cts) cts.textContent=d.ts.toFixed(1);
    const fp=$('#c-flag'); if(fp){
      if(lineStatus==='stopped'){ fp.className='pill alert'; fp.textContent='⛔ ライン停止'; }
      else if(flagged){ fp.className='pill warn'; fp.textContent='⚠ '+d.flags[0].reason; }
      else { fp.className='pill ok'; fp.textContent='整列 正常'; } }
  }
  // sidebar dot for line A + global status always
  const dot=$('#dot-A'); if(dot) dot.className='ld '+({running:'',warning:'warn',stopped:'alert',recovered:''}[lineStatus]||'');
  setGlobalStatus();
  for(const n of (d.notifications||[])){ addAlert(n); }
  // loud sink failures (Slack配信失敗の明示 — 無音フォールバック禁止)
  if(d.sink_error){ let b=$('#sinkerr'); if(!b){ b=document.createElement('div'); b.id='sinkerr';
    b.style.cssText='position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#b3261e;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.3)';
    document.body.appendChild(b);} b.textContent='⚠ '+d.sink_error; }
  else{ $('#sinkerr')?.remove(); }
}
function connect(){ es=new EventSource('/stream'); es.addEventListener('frame',onFrame); }

// ---- alerts (AI agent, live line only) ----
const shownSig=new Set(); let anomalyCount=0, anomalySeen=false;
function ensureFeed(){ if(!hasContent){ $('#empty')?.remove(); hasContent=true; } }
function addMsg(cls,text){ ensureFeed(); const d=document.createElement('div');
  d.className='msg '+cls; d.textContent=text; feed.appendChild(d); feed.scrollTop=feed.scrollHeight; }
// LLM self-reported confidence is calibration-free — never show a flat 100%
function confPct(v){ return Math.round(Math.min(v||0,0.95)*100); }
const escH=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// 初動短縮: how the same situation was fixed last time (past-case reflux, human-facing)
function simHtml(sc){
  if(!sc) return '';
  return '<div class="sim">📚 類似の過去停止: 真因「'+escH(sc.cause)+'」'+
    (sc.action_taken?' ／ 処置: '+escH(sc.action_taken):'')+
    (sc.photo?' ／ <a href="/attachment/'+encodeURIComponent(sc.source_event_id)+'" target="_blank">📷 現場写真</a>':'')+'</div>';
}
// 「この設備の担当は誰々 → 通知しました」— 通知の宛先を役割名でなく名前で語る
function routeHtml(rt){
  if(!rt||!rt.primary) return '';
  let s='👥 この設備の担当: <b>'+escH(rt.primary)+'</b>'+(rt.notified?' に通知しました':'');
  if(rt.tier2) s+='。応答がなければ'+rt.tier2_min+'分後に '+escH(rt.tier2)+' へ連絡します';
  return '<div class="evi" style="margin-top:6px">'+s+'。</div>';
}
async function addAlert(n){
  if(!anomalySeen) return;
  const evs=await (await fetch('/events')).json();
  const it=evs.find(e=>e.event && e.event.event_id===n.event_id);
  if(!it || !it.rca) return;
  const c=it.rca; const sig=it.event.kind+'|'+c.cause_candidates.join(',');
  if(shownSig.has(sig)) return; shownSig.add(sig); anomalyCount++;
  ensureFeed();
  const id=it.event.event_id;
  const div=document.createElement('div'); div.className='alert-card'; div.id='ac-'+id;
  // the story text already ends with 根拠 — the evidence row below shows it
  // structured, so strip the tail instead of printing the same values twice
  const story=(n.text||'異常を検知しました').split(/。?根拠:/)[0].replace(/。?$/,'。');
  div.innerHTML=
    '<div class="ah">🤖 AIエージェント · 組立ライン1</div>'+
    '<div class="ab"><div class="cause">'+story+'</div>'+
    '<div class="conf"><div class="bar"><i style="width:'+confPct(c.confidence)+'%"></i></div>'+
    '<small>確信度 '+confPct(c.confidence)+'%</small></div>'+
    '<div class="evi">参照ログ: '+(c.evidence||[]).slice(0,3).join(' ・ ')+'</div>'+
    routeHtml(n.routing)+
    simHtml(n.similar_case)+
    '<img class="thumb" src="/frame/'+id+'" onerror="this.remove()" '+
    'onload="feed.scrollTop=feed.scrollHeight">'+
    '<div class="fb"><button class="ok" onclick="fb(this,\''+id+'\',\'correct\')">✓ 確認・正しい</button>'+
    '<button class="no" onclick="fb(this,\''+id+'\',\'wrong\')">✗ 原因が違う</button></div>'+
    '<div class="ackrow"><button onclick="ackEvt(this,\''+id+'\')">👋 私が対応します</button></div></div>';
  if(n.routing){ div.dataset.p1=n.routing.primary||''; div.dataset.p2=n.routing.tier2||''; }
  feed.appendChild(div); feed.scrollTop=feed.scrollHeight;
  refreshMetrics();
  startPoll(id);
}
// ---- 面間同期: Slack/モバイルでの ack・裁定・自動連絡の経過をこのカードにも反映 ----
const pollTimers={};
function startPoll(id){
  if(pollTimers[id]) return;
  let ticks=0;
  pollTimers[id]=setInterval(async()=>{
    if(document.hidden) return;
    if(++ticks>450){ stopPoll(id); return; }        // ~30分で打ち切り
    try{
      const d=await (await fetch('/api/event/'+id)).json();
      applyState(id,d);
      if(d.verdict) stopPoll(id);                    // 裁定で解決 — 追従終了
    }catch(e){}
  },4000);
}
function stopPoll(id){ clearInterval(pollTimers[id]); delete pollTimers[id]; }
function applyState(id,d){
  const card=document.getElementById('ac-'+id); if(!card) return;
  const row=card.querySelector('.ackrow');
  if(d.ack && row && !row.querySelector('.acked'))
    renderAckBadge(row, d.ack.actor_name||'現場の担当者', false);
  if(d.verdict && !card.querySelector('.vdone')){
    card.querySelectorAll('.fb button').forEach(b=>b.classList.add('done'));
    const v=document.createElement('div'); v.className='evi vdone';
    const w=d.verdict.actor_name||'';
    v.textContent=(d.verdict.verdict==='correct'?'✓ 「正しい」と裁定されました':'✗ 「原因が違う」と裁定されました')
      +(w?'（'+w+'）':'');
    card.querySelector('.ab').appendChild(v);
  }
  if(d.escalation_notes && d.escalation_notes.length){
    let esc=card.querySelector('.escl');
    if(!esc){ esc=document.createElement('div'); esc.className='evi escl';
      card.querySelector('.ab').appendChild(esc); }
    esc.textContent=d.escalation_notes.at(-1);
  }
}
async function refreshMetrics(){
  try{ const m=await (await fetch('/metrics')).json();
    $('#k-acc').textContent=m.total?Math.round((m.correct_rate||0)*100)+'%':'–'; }catch(e){}
}
// ---- HITL feedback: 「正しい」は決定論記録、「原因が違う」はエージェントとの対話で暗黙知を収集 ----
let correcting=null;   // {event_id, card} while eliciting a correction
function postJSON(url,data){ return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify(data)}).then(r=>r.json()); }
function addTyping(){ ensureFeed(); const d=document.createElement('div'); d.className='msg bot'; d.textContent='…';
  feed.appendChild(d); feed.scrollTop=feed.scrollHeight; return d; }
function markFbDone(btn){ const box=btn.closest('.fb'); if(box) box.querySelectorAll('button').forEach(b=>b.classList.add('done')); }
function setComposerMode(on){ $('#composer').classList.toggle('correcting',on);
  $('#q').placeholder = on ? '現場の見立てを入力…（例: ガイドレールのボルトが緩んでいた）' : 'ラインやログについて質問…'; }
// Enter submits — but NOT while the IME is mid-conversion (isComposing / legacy keyCode 229),
// so confirming a kana→kanji candidate with Enter no longer fires an accidental send.
function onKey(e){ if(e.key==='Enter' && !e.isComposing && e.keyCode!==229) send(); }
// Reply chips: default free-chat prompts; during a correction, the候補 become
// plausible ANSWERS to the AI's question (contextual to the anomaly, from /correct).
const DEFAULT_CHIPS=['ズレの原因は？','各センサーは正常？','ベルト速度の傾向は？'];
function renderChips(list){ const box=$('#chips'); if(!box) return; box.innerHTML='';
  for(const t of (list&&list.length?list:DEFAULT_CHIPS)){
    const s=document.createElement('span'); s.className='chip'; s.textContent=t; s.onclick=()=>ask(s); box.appendChild(s); } }

// 「誰が対応するか」を名前で確定する — 当番チップ1タップ or 自由入力。
// 名前は端末に記憶（次回1タップ）。未入力でも確定できる（初動の速さが正義）。
const cleanName=s=>String(s||'').replace(/（[^）]*）/g,'').replace(/さん$/,'').trim();
function ackEvt(btn,id){
  const row=btn.closest('.ackrow'), card=btn.closest('.alert-card');
  row.innerHTML='';
  const lbl=document.createElement('div'); lbl.className='ackwho';
  lbl.textContent='どなたが対応しますか？（タップで全画面・Slackに共有されます）';
  row.appendChild(lbl);
  const names=[...new Set([localStorage.getItem('eandon-name'),
    cleanName(card.dataset.p1), cleanName(card.dataset.p2)].filter(Boolean))];
  for(const nm of names){ const b=document.createElement('button'); b.className='ackchip';
    b.textContent='👋 '+nm; b.onclick=()=>doAck(row,id,nm); row.appendChild(b); }
  const other=document.createElement('button'); other.className='ackchip';
  other.textContent='✏️ 名前を入力';
  other.onclick=()=>{
    const inp=document.createElement('input'); inp.className='ackname';
    inp.placeholder='お名前（例: 佐藤）'; inp.maxLength=24;
    const go=document.createElement('button'); go.className='ackchip'; go.textContent='確定';
    go.onclick=()=>doAck(row,id,inp.value.trim());
    inp.onkeydown=e=>{ if(e.key==='Enter'&&!e.isComposing&&e.keyCode!==229) go.onclick(); };
    other.replaceWith(inp,go); inp.focus(); };
  row.appendChild(other);
}
async function doAck(row,id,name){
  if(name) localStorage.setItem('eandon-name',name);
  const r=await postJSON('/ack',{event_id:id,user_id:UID,display_name:name||''});
  if(r.already_adjudicated){ row.innerHTML=''; addMsg('bot','このイベントは裁定済みです。'); return; }
  if(!r.ok){ addMsg('bot','記録に失敗: '+(r.error||'')); return; }
  const who=(r.already_acked&&r.ack&&(r.ack.actor_name))||name||'現場の担当者';
  renderAckBadge(row,who,!r.already_acked);
  if(r.already_acked) addMsg('bot','先に '+who+' さんが対応中です。');
}
function renderAckBadge(row,who,mine){
  row.innerHTML='<button class="acked" disabled>👋 '+escH(who)+' さんが対応中'
    +(mine?' — 以降の自動連絡は止めました':'')+'</button>';
}
async function fb(btn,id,verdict){
  if(verdict==='wrong') return startCorrection(btn,id);
  markFbDone(btn);
  const r=await postJSON('/feedback',{event_id:id,verdict:'correct',user_id:UID,
    display_name:localStorage.getItem('eandon-name')||''});
  if(r.already_adjudicated){ const w=r.prior&&r.prior.actor_name;
    addMsg('bot','このイベントは裁定済みです'+(w?'（'+w+'）':'')+'。'); }
  else addMsg('bot', r.ok?'ご確認ありがとうございます。「正しい」と記録しました。':('記録に失敗: '+r.error));
  refreshMetrics();
}
async function startCorrection(btn,id){
  markFbDone(btn);
  correcting={event_id:id, card:btn.closest('.alert-card')};
  correcting.card?.classList.add('correcting');
  setComposerMode(true);
  const t=addTyping();
  try{ const r=await postJSON('/correct',{event_id:id,message:'',user_id:UID});
    t.remove(); addMsg('bot',r.reply); renderChips(r.suggestions); }
  catch(e){ t.remove(); addMsg('bot','応答の取得に失敗しました。'); }
  $('#q').focus();
}
function cancelCorrection(){
  correcting?.card?.classList.remove('correcting');
  correcting=null; setComposerMode(false); renderChips(DEFAULT_CHIPS);
  addMsg('bot','訂正モードを終了しました。いつでも通知の「✗ 原因が違う」から再開できます。');
}
function finishCorrection(r){
  correcting?.card?.classList.remove('correcting');
  correcting?.card?.classList.add('corrected');
  correcting=null; setComposerMode(false); renderChips(DEFAULT_CHIPS);
  if(r.metrics && r.metrics.total){ $('#k-acc').textContent=Math.round((r.metrics.correct_rate||0)*100)+'%'; }
  refreshMetrics();
}
function ask(chip){ $('#q').value=chip.textContent; send(); }
async function send(){
  const q=$('#q'); const m=q.value.trim(); if(!m)return;
  addMsg('me',m); q.value='';
  const t=addTyping();
  try{
    if(correcting){
      const r=await postJSON('/correct',{event_id:correcting.event_id,message:m,user_id:UID});
      t.remove(); addMsg('bot',r.reply);
      if(r.recorded) finishCorrection(r); else renderChips(r.suggestions);
    } else {
      const r=await postJSON('/chat',{message:m,user_id:UID});
      t.remove(); addMsg('bot',r.reply);
    }
  }catch(e){ t.remove(); addMsg('bot','応答の取得に失敗しました。'); }
  feed.scrollTop=feed.scrollHeight;
}
