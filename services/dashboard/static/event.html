<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>e-Andon — 裁定</title>
<style>
  /* 現場スマホ前提: 390px 縦・手袋・立ち作業 (Req 8.1/8.2) */
  :root{--bg:#0f1115;--card:#181c23;--fg:#e8eaee;--muted:#9aa3b2;--brand:#4da3ff;
        --ok:#2e9e5b;--ng:#c33d3d;--line:#2a3140}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--fg);font:15px/1.6 system-ui,-apple-system,"Hiragino Sans",sans-serif;
       max-width:480px;margin:0 auto;padding:14px 14px 40px}
  h1{font-size:16px;color:var(--muted);font-weight:600;margin-bottom:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .cause{font-size:18px;font-weight:700;line-height:1.4}
  .conf{color:var(--brand);font-weight:700}
  .ev{color:var(--muted);font-size:13px;margin-top:8px;white-space:pre-wrap}
  img.frame{width:100%;border-radius:10px;margin-top:10px;background:#000;min-height:120px}
  .btns{display:flex;gap:10px;margin-top:4px}
  button{flex:1;min-height:52px;border:none;border-radius:12px;color:#fff;
         font-size:16px;font-weight:700;cursor:pointer}  /* ≥44px tap target */
  .ok{background:var(--ok)} .ng{background:var(--ng)}
  button:disabled{opacity:.45}
  .done{padding:12px;border-radius:10px;background:#20304a;font-weight:600;display:none}
  #chat{display:none}
  #log{max-height:40vh;overflow-y:auto;font-size:14px;margin-bottom:10px}
  #log .m{padding:8px 10px;border-radius:10px;margin:6px 0;white-space:pre-wrap}
  #log .ai{background:#222b3a} #log .me{background:#2c3a2e;text-align:right}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chips span{border:1px solid var(--line);border-radius:14px;padding:6px 10px;font-size:12px;
              color:var(--muted);cursor:pointer}
  .row{display:flex;gap:8px}
  input[type=text]{flex:1;min-height:48px;background:#10141b;border:1px solid var(--line);
        border-radius:10px;color:var(--fg);padding:0 12px;font-size:15px}
  .send{flex:0 0 84px;background:var(--brand)}
  .esc{color:#ffb454;font-size:13px;margin-top:8px}
  .err{color:#ff7a7a;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<h1>e-Andon — 停止イベントの裁定</h1>
<div class="card" id="main">読み込み中…</div>
<div class="card">
  <div class="btns">
    <button class="ok" id="b-ok">✅ 正しい</button>
    <button class="ng" id="b-ng">❌ 違う</button>
  </div>
  <div class="done" id="done"></div>
  <div class="err" id="err"></div>
</div>
<div class="card" id="chat">
  <div id="log"></div>
  <div class="chips" id="chips"></div>
  <div class="row">
    <input type="text" id="msg" placeholder="現場で見た原因を入力…">
    <button class="send" id="b-send">送信</button>
  </div>
  <div class="row" style="margin-top:8px;align-items:center">
    <label style="flex:1;color:var(--muted);font-size:13px">
      📷 原因箇所の写真（任意・1枚）
      <input type="file" id="photo" accept="image/*" capture="environment"
             style="display:block;margin-top:4px;color:var(--muted);font-size:12px">
    </label>
    <span id="photo-st" style="font-size:12px;color:var(--muted)"></span>
  </div>
</div>
<script>
const eid = location.pathname.split('/').pop();
const uid = 'mobile-' + (localStorage.uid ||= Math.random().toString(36).slice(2,8));
const $ = s => document.querySelector(s);
let suggestions = [];

function showDone(v){
  const who = (v && (v.actor_name || v.actor_id)) || '';
  const tail = who ? `（${who}）` : '';
  $('#done').textContent = v && v.verdict === 'correct'
    ? `裁定済み: ✅ 正しい${tail}` : `裁定済み: ❌ 違う — 訂正記録あり${tail}`;
  $('#done').style.display = 'block';
  $('#b-ok').disabled = $('#b-ng').disabled = true;
}

async function load(){
  const r = await fetch('/api/event/' + eid);
  if(!r.ok){ $('#main').textContent = '対象の異常が見つかりません。';
             $('#b-ok').disabled = $('#b-ng').disabled = true; return; }
  const d = await r.json();
  suggestions = d.suggestions || [];
  const rca = d.rca || {};
  const conf = Math.min(rca.confidence ?? 0, 0.95);
  const kinds = {offset:'横ズレ', rotation:'角度ずれ', gap:'間隔異常'};
  $('#main').innerHTML =
    `<div class="cause">${(rca.cause_candidates||['推定中']).slice(0,2).join('、')}</div>` +
    `<div>確信度 <span class="conf">${Math.round(conf*100)}%</span>` +
    `｜検知: ${kinds[d.event.kind]||d.event.kind} ${Math.round(d.event.peak_magnitude)}px</div>` +
    `<div class="ev">${(rca.evidence||[]).slice(0,3).map(e=>'• '+e).join('\n')}</div>` +
    (d.escalation_notes?.length ? `<div class="esc">${d.escalation_notes.at(-1)}</div>` : '') +
    `<img class="frame" src="/frame/${eid}" onerror="this.remove()">`;
  if(d.verdict) showDone(d.verdict);
}

$('#b-ok').onclick = async () => {
  const r = await fetch('/feedback', {method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({event_id: eid, verdict: 'correct', user_id: uid})});
  const d = await r.json();
  if(d.ok) showDone(d.already_adjudicated ? d.prior && {verdict:d.prior.verdict, actor_id:d.prior.actor_id}
                                          : {verdict:'correct', actor_id: uid});
  else $('#err').textContent = d.error || '記録に失敗しました。';
};

function addMsg(cls, text){ const m = document.createElement('div');
  m.className = 'm ' + cls; m.textContent = text; $('#log').appendChild(m);
  $('#log').scrollTop = 1e9; }

async function turn(message){
  if(message) addMsg('me', message);
  const r = await fetch('/correct', {method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({event_id: eid, message, user_id: uid})});
  const d = await r.json();
  addMsg('ai', d.reply);
  $('#chips').innerHTML = '';
  if(d.recorded){ showDone({verdict:'wrong', actor_id: uid}); $('#msg').disabled = true;
                  $('#b-send').disabled = true; }
  else for(const s of (d.suggestions || suggestions)){
    const c = document.createElement('span'); c.textContent = s;
    c.onclick = () => turn(s); $('#chips').appendChild(c); }
}

$('#b-ng').onclick = () => { $('#chat').style.display = 'block'; $('#b-ng').disabled = true;
                             turn(''); window.scrollTo(0, 1e9); };
$('#b-send').onclick = () => { const v = $('#msg').value.trim();
                               if(v){ $('#msg').value=''; turn(v); } };
$('#msg').addEventListener('keydown', e => { if(e.key === 'Enter') $('#b-send').click(); });
$('#photo').addEventListener('change', async e => {
  const f = e.target.files[0]; if(!f) return;
  $('#photo-st').textContent = '送信中…';
  const fd = new FormData(); fd.append('file', f);
  const r = await fetch('/correct/attachment?event_id=' + encodeURIComponent(eid),
                        {method:'POST', body: fd});
  const d = await r.json();
  $('#photo-st').textContent = d.ok ? '✅ 添付済み（訂正確定時に事例へ保存）' : '⚠ ' + (d.error||'失敗');
});
load();
</script>
</body>
</html>
