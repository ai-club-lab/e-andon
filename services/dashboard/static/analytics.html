<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-Andon — 分析</title>
<style>
  :root{--bg:#0f1115;--card:#181c23;--fg:#e8eaee;--muted:#9aa3b2;--brand:#4da3ff;
        --warn:#ffb454;--line:#2a3140;--bar:#3d6fa8}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.6 system-ui,-apple-system,"Hiragino Sans",sans-serif;
       max-width:980px;margin:0 auto;padding:18px}
  header{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  h1{font-size:17px}
  a.back{color:var(--brand);text-decoration:none;font-size:13px}
  .seg{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:none;color:var(--muted);padding:6px 14px;cursor:pointer;font-size:13px}
  .seg button.on{background:var(--brand);color:#fff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  h2{font-size:14px;color:var(--muted);margin-bottom:10px;font-weight:600}
  .alert{border-left:3px solid var(--warn);background:#231e14;border-radius:8px;
         padding:10px 12px;margin-bottom:8px;font-size:13px}
  .empty{color:var(--muted);padding:14px;text-align:center}
  svg{width:100%;height:auto;display:block}
  svg text{fill:var(--muted);font-size:11px}
  .bar{fill:var(--bar);cursor:pointer} .bar:hover{fill:var(--brand)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left}
  td a{color:var(--brand);text-decoration:none}
  #drill{display:none}
</style>
</head>
<body>
<header>
  <a class="back" href="/">← ダッシュボード</a>
  <h1>📊 分析 — チョコ停の構造と AI の学習</h1>
  <div class="seg" id="seg">
    <button data-d="7" class="on">7日</button><button data-d="30">30日</button>
  </div>
</header>

<div class="card" id="rec-card"><h2>⚠ 再発アラート（同一真因の頻発を能動検知）</h2><div id="rec"></div></div>
<div class="card"><h2>チョコ停パレート — 真因カテゴリ別 停止回数 × 累計損失（分）</h2><div id="pareto"></div></div>
<div class="card" id="drill"><h2 id="drill-t">イベント一覧</h2><div id="drill-b"></div></div>
<div class="card"><h2>AI 正答率の推移（人の裁定に基づく）</h2><div id="acc"></div></div>
<div class="card"><h2>📚 学習データの蓄積 — 誰が・いつ・何を教えたか</h2><div id="cases"></div></div>

<script>
let days = 7;
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function paretoSvg(d){
  if(d.empty) return '<div class="empty">この期間のデータはありません</div>';
  const W=920, H=260, P=40, bw=Math.min(120,(W-2*P)/d.buckets.length*0.6);
  const maxC=Math.max(...d.buckets.map(b=>b.count));
  const x=i=>P+(W-2*P)*(i+0.5)/d.buckets.length;
  const y=c=>H-30-(H-70)*c/maxC, yr=r=>H-30-(H-70)*r;
  let s=`<svg viewBox="0 0 ${W} ${H}" role="img">`;
  d.buckets.forEach((b,i)=>{
    s+=`<rect class="bar" x="${x(i)-bw/2}" y="${y(b.count)}" width="${bw}" height="${H-30-y(b.count)}"
         onclick="drill('${b.category}','${esc(b.label)}')"><title>${esc(b.label)}: ${b.count}回 / ${b.loss_minutes}分</title></rect>`;
    s+=`<text x="${x(i)}" y="${H-14}" text-anchor="middle">${esc(b.label)}</text>`;
    s+=`<text x="${x(i)}" y="${y(b.count)-6}" text-anchor="middle">${b.count}回 / ${b.loss_minutes}分</text>`;
  });
  const pts=d.buckets.map((b,i)=>`${x(i)},${yr(b.cum_ratio)}`).join(' ');
  s+=`<polyline points="${pts}" fill="none" stroke="#ffb454" stroke-width="2"/>`;
  d.buckets.forEach((b,i)=>{ s+=`<circle cx="${x(i)}" cy="${yr(b.cum_ratio)}" r="3" fill="#ffb454"/>
    <text x="${x(i)+bw/2+6}" y="${yr(b.cum_ratio)+4}" fill="#ffb454">${Math.round(b.cum_ratio*100)}%</text>`; });
  return s+'</svg>';
}

function accSvg(d){
  if(d.empty) return '<div class="empty">裁定データがまだありません</div>';
  const W=920,H=180,P=40, n=d.points.length;
  const x=i=>n===1?W/2:P+(W-2*P)*i/(n-1), y=r=>H-30-(H-60)*r;
  let s=`<svg viewBox="0 0 ${W} ${H}">`;
  [0,0.5,1].forEach(r=>{ s+=`<line x1="${P}" y1="${y(r)}" x2="${W-P}" y2="${y(r)}" stroke="#2a3140"/>
    <text x="6" y="${y(r)+4}">${r*100}%</text>`; });
  s+=`<polyline points="${d.points.map((p,i)=>`${x(i)},${y(p.correct_rate)}`).join(' ')}"
       fill="none" stroke="#4da3ff" stroke-width="2"/>`;
  d.points.forEach((p,i)=>{ s+=`<circle cx="${x(i)}" cy="${y(p.correct_rate)}" r="3" fill="#4da3ff">
    <title>${p.date}: ${Math.round(p.correct_rate*100)}% (n=${p.n})</title></circle>
    <text x="${x(i)}" y="${H-10}" text-anchor="middle">${p.date.slice(5)}</text>`; });
  return s+'</svg>';
}

async function drill(cat,label){
  const evs=await (await fetch('/events')).json();
  const rows=evs.filter(e=>((e.rca&&e.rca.category)||'other')===cat);
  $('#drill-t').textContent=`イベント一覧 — ${label}（${rows.length}件）`;
  $('#drill-b').innerHTML = rows.length ? '<table><tr><th>event</th><th>種別</th><th>ピーク</th><th>裁定</th><th></th></tr>'+
    rows.map(e=>{const v=e.verdict; const ev=e.event;
      return `<tr><td>${esc(ev.event_id)}</td><td>${esc(ev.kind)}</td><td>${Math.round(ev.peak_magnitude)}px</td>
      <td>${v?(v.verdict==='correct'?'✅':'❌')+(v.actor_name||''):'未裁定'}</td>
      <td><a href="/e/${esc(ev.event_id)}">開く →</a></td></tr>`;}).join('')+'</table>'
    : '<div class="empty">該当イベントなし</div>';
  $('#drill').style.display='block'; $('#drill').scrollIntoView({behavior:'smooth'});
}

function casesTable(d){
  if(!d.rows.length) return '<div class="empty">まだ裁定・訂正がありません</div>';
  const fmt=t=>t?new Date(t*1000).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'–';
  return `<div style="color:var(--muted);font-size:12px;margin-bottom:8px">全${d.total}件（最新${d.rows.length}件）
    — ❌ の行は訂正が事例化され、次回同種異常の推論に few-shot として還流します</div>`+
    '<table><tr><th>日時</th><th>裁定</th><th>誰が</th><th>面</th><th>教えた真因（訂正時）</th><th></th></tr>'+
    d.rows.map(r=>`<tr><td>${fmt(r.ts)}</td>
      <td>${r.verdict==='correct'?'✅ 正しかった':'❌ 原因が違った'}</td>
      <td>${esc(r.actor_name||'現場の担当者')}</td><td>${esc(r.surface)}</td>
      <td>${r.taught_cause?esc(r.taught_cause):'<span style="color:var(--muted)">—（AIの推定を承認）</span>'}</td>
      <td><a href="/e/${esc(r.event_id)}">開く →</a></td></tr>`).join('')+'</table>';
}

async function load(){
  const [p,a,r,c]=await Promise.all([
    fetch('/analytics/pareto?days='+days).then(r=>r.json()),
    fetch('/analytics/accuracy?days='+Math.max(days,30)).then(r=>r.json()),
    fetch('/analytics/recurrence?days='+days).then(r=>r.json()),
    fetch('/analytics/cases').then(r=>r.json())]);
  $('#pareto').innerHTML=paretoSvg(p);
  $('#acc').innerHTML=accSvg(a);
  $('#cases').innerHTML=casesTable(c);
  $('#rec').innerHTML=r.alerts.length
    ? r.alerts.map(al=>`<div class="alert"><b>${esc(al.label)}</b> — ${esc(al.suggestion)}</div>`).join('')
    : '<div class="empty">再発の兆候はありません（'+days+'日窓・閾値'+r.threshold+'回）</div>';
}
$('#seg').onclick=e=>{ const b=e.target.closest('button'); if(!b) return;
  days=+b.dataset.d; document.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x===b)); load(); };
load();
</script>
</body>
</html>
