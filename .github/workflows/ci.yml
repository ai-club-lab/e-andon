name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests & compile sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps (shared + detector)
        working-directory: services/detector
        run: |
          python -m pip install -U pip pytest
          pip install -r requirements.txt
      - name: Offline tests (deterministic CV + guardrails)
        env:
          PYTHONPATH: services/detector   # tests open video/ by a repo-root-relative path
        run: python -m pytest -q services/detector/test_detection.py services/detector/test_guardrails.py
      - name: Install deps (agent)
        working-directory: services/agent
        run: pip install -r requirements.txt
      - name: Install deps (dashboard)
        working-directory: services/dashboard
        run: pip install -r requirements.txt httpx
      - name: Shared contract tests (human-loop types)
        run: python -m pytest -q packages/shared/test_contracts.py
      - name: Offline UI + human-loop tests (dashboard API / sinks / routing / escalation / Slack inbound / analytics)
        env:
          PYTHONPATH: services/dashboard:services/agent:services/detector
        run: python -m pytest -q services/dashboard/
      - name: Compile sanity (all services)
        run: |
          python -m py_compile \
            packages/shared/chokotei_shared/*.py \
            services/detector/*.py \
            services/agent/*.py \
            services/dashboard/*.py

  build:
    name: Docker build (deploy image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the same image Cloud Run runs
        run: docker build -t chokotei-dashboard:${{ github.sha }} .

  # Failure-only ping to #github-feed (Discord). Green runs stay silent to keep the
  # channel lean; a broken test/build surfaces once. Secret = DISCORD_WEBHOOK_URL.
  notify:
    name: Notify on CI failure
    needs: [test, build]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord (CI failed)
        continue-on-error: true
        run: |
          curl -fsS -H "Content-Type: application/json" -X POST \
            -d "{\"content\":\"❌ CI **failed** on \`${GITHUB_REF_NAME}\` — \`${GITHUB_SHA:0:7}\` (${GITHUB_EVENT_NAME})\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
